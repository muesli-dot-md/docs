# Muesli docs — nginx server config.
# Serves the static Docusaurus build. TLS is terminated upstream by Traefik,
# so this listens on plain HTTP :80 only.
#
# Note: caching uses the `expires` directive (not `add_header Cache-Control`)
# on purpose. nginx's `add_header` does NOT inherit into a location that has its
# own `add_header`, which would silently drop the security headers below. The
# `expires` directive avoids that gotcha, so the security headers apply to every
# response (HTML and static assets alike).

server {
    listen       80;
    listen       [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # ---- gzip compression ----
    gzip              on;
    gzip_vary         on;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_proxied      any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml
        font/ttf
        font/otf
        font/woff
        font/woff2;

    # ---- security headers (apply to all responses) ----
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ---- long cache for content-hashed static assets ----
    # Docusaurus fingerprints assets under /assets/, so they can cache for a year.
    # `^~` makes this prefix win over the regex location below.
    location ^~ /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # Other common static file types (safe to cache a while).
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|svg|png|jpe?g|gif|ico|webp|avif)$ {
        expires 30d;
        try_files $uri =404;
    }

    # HTML should always be revalidated so new deploys show up immediately.
    # `expires -1` emits `Cache-Control: no-cache`. Unknown paths return a real
    # 404 status served with Docusaurus's static 404 page.
    location / {
        expires -1;
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
        expires -1;
    }
}
